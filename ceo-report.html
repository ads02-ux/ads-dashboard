<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CEO Report — Rich Biotech</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Sarabun,sans-serif;background:#eef2f7;color:#0f172a;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.page{max-width:980px;margin:0 auto;background:#fff;box-shadow:0 0 60px rgba(0,0,0,.12);min-height:100vh}
.hd{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 55%,#1a237e 100%);color:#fff;padding:38px 48px 32px}
.brand{font-family:Rajdhani,sans-serif;font-size:.78rem;letter-spacing:3px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:6px}
.hd-title{font-family:Rajdhani,sans-serif;font-size:1.45rem;font-weight:700;letter-spacing:.5px;line-height:1.4;margin-bottom:5px}
.hd-meta{font-size:.72rem;color:rgba(255,255,255,.4);margin-bottom:20px}
.vrd{display:inline-flex;align-items:center;gap:10px;padding:10px 24px;border-radius:30px;font-weight:700;font-size:.9rem}
.period-bar{background:#f8faff;border-bottom:2px solid #e2e8f0;display:flex;gap:0;padding:0 48px}
.ptab{padding:14px 28px;border:none;background:none;font-family:Sarabun,sans-serif;font-size:.85rem;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s}
.ptab:hover{color:#1565c0}
.ptab.active{color:#1565c0;border-bottom:3px solid #1565c0;background:none}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:2px solid #f1f5f9}
.kpi-card{padding:24px 16px;text-align:center;border-right:1px solid #f1f5f9}
.kpi-card:last-child{border-right:none}
.kpi-lbl{font-size:.6rem;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:700}
.kpi-val{font-size:1.6rem;font-weight:800;line-height:1}
.section{padding:28px 48px;border-bottom:1px solid #f1f5f9}
.sec-ttl{font-family:Rajdhani,sans-serif;font-size:.68rem;font-weight:700;color:#94a3b8;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid #f1f5f9}
.ft{padding:22px 48px;background:#f8faff;text-align:center;font-size:.7rem;color:#94a3b8;border-top:1px solid #e2e8f0}
.hd-btns{display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0}
.hd-btn{border-radius:8px;padding:10px 18px;font-size:.78rem;cursor:pointer;font-family:inherit;white-space:nowrap;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;letter-spacing:.3px;transition:.15s}
.hd-btn:hover{background:rgba(255,255,255,.2)}
.copy-btn{background:rgba(255,255,255,.06);color:rgba(255,255,255,.75);font-size:.73rem}
.err{padding:80px;text-align:center;color:#ef4444;font-size:1.1rem}
.camp-tab-bar{display:flex;flex-wrap:wrap;gap:6px;padding:16px 48px;background:#f8faff;border-bottom:1px solid #e2e8f0}
.camp-tab{padding:7px 16px;border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;font-family:Sarabun,sans-serif;font-size:.78rem;font-weight:600;color:#64748b;cursor:pointer;transition:.15s;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
.camp-tab:hover{border-color:#93c5fd;color:#1565c0}
.camp-tab.active{background:#1565c0;color:#fff;border-color:#1565c0}
.camp-tab.all-tab{background:linear-gradient(135deg,#1e3a5f,#1565c0);color:#fff;border:none}
.camp-tab.all-tab.active{background:linear-gradient(135deg,#1565c0,#42a5f5);box-shadow:0 0 0 2px rgba(255,255,255,.5)}
.cmp-table{width:100%;border-collapse:collapse;font-size:.8rem}
.cmp-table th{padding:10px 14px;background:#f1f5ff;font-weight:700;color:#475569;font-size:.72rem;text-align:right;border:1px solid #e2e8f0}
.cmp-table th:first-child{text-align:left}
.cmp-table td{padding:10px 14px;border:1px solid #e2e8f0;text-align:right;vertical-align:middle}
.cmp-table td:first-child{text-align:left;font-weight:700;color:#0f172a;font-size:.82rem}
.cmp-table tr:hover td{background:#f8faff}
.best-val{color:#10b981;font-weight:800}
.worst-val{color:#ef4444}
@media(max-width:600px){.hd{padding:24px 20px 20px}.section{padding:20px}.period-bar{padding:0 20px}.kpi-val{font-size:1.2rem}.kpi-card{padding:16px 8px}.hd-title{font-size:1.1rem}.camp-tab-bar{padding:12px 16px}}
@media print{body{background:#fff}.no-print{display:none!important}.page{box-shadow:none}}
</style>
</head>
<body>
<div id="app"><div style="padding:80px;text-align:center;font-family:Sarabun,sans-serif;color:#94a3b8;font-size:1rem">Loading...</div></div>
<script>
(function(){
var raw=location.hash.slice(1);
if(!raw){document.getElementById('app').innerHTML='<div class="page"><div class="err">No data</div></div>';return;}
var data;
try{
  var json=null;
  if(window.LZString){try{json=LZString.decompressFromEncodedURIComponent(raw);}catch(e2){}}
  if(!json){try{json=decodeURIComponent(escape(atob(raw)));}catch(e3){}}
  if(!json)throw new Error('decode failed');
  data=JSON.parse(json);
}catch(e){document.getElementById('app').innerHTML='<div class="page"><div class="err">Cannot read data</div></div>';return;}

var campaigns=[];
if(data.campaigns&&Array.isArray(data.campaigns)){campaigns=data.campaigns;}
else if(data.name){campaigns=[{name:data.name,agg:data.agg,daily:data.daily||[]}];}
if(!campaigns.length){document.getElementById('app').innerHTML='<div class="page"><div class="err">No campaigns</div></div>';return;}

var creatives=data.creatives||[];
var isMulti=campaigns.length>1;
var currentCampIdx=-1;
var currentPeriod=30;

function fmt(n){if(n===undefined||n===null)return'--';var v=+n;if(isNaN(v))return'--';return v.toLocaleString('th-TH',{maximumFractionDigits:0});}

function calcAgg(arr){
  var a={spend:0,revenue:0,impressions:0,clicks:0,purchases:0,conversations:0};
  (arr||[]).forEach(function(d){a.spend+=(+d.spend||0);a.revenue+=(+d.revenue||0);a.impressions+=(+d.impressions||0);a.clicks+=(+d.clicks||0);a.purchases+=(+d.purchases||0);a.conversations+=(+d.conversations||0);});
  a.roas=a.spend>0?Math.round(a.revenue/a.spend*100)/100:0;
  a.ctr=a.impressions>0?Math.round(a.clicks/a.impressions*10000)/100:0;
  a.costPerBuy=a.purchases>0?Math.round(a.spend/a.purchases):0;
  return a;
}

function getTargetDate(period){
  var now=new Date();
  var pad=function(n){return String(n).padStart(2,'0');};
  if(period==='today')return now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  if(period==='yesterday'){var y=new Date(now-86400000);return y.getFullYear()+'-'+pad(y.getMonth()+1)+'-'+pad(y.getDate());}
  return null;
}
function filterByPeriod(arr,period){
  var td=getTargetDate(period);
  if(td)return(arr||[]).filter(function(d){return d.date===td;});
    var _n=new Date(),_p=function(n){return String(n).padStart(2,'0');},_ts=_n.getFullYear()+'-'+_p(_n.getMonth()+1)+'-'+_p(_n.getDate());
      var filtered=(arr||[]).filter(function(d){return!d.date||d.date<_ts;});
        if(filtered.length>=period)return filtered.slice(-period);
          return filtered;
}

function getVerdict(roas){
  if(roas>=2)return{vrd:'Good — Keep Going',vColor:'#065f46',vBg:'linear-gradient(135deg,#d1fae5,#a7f3d0)',vIcon:'OK'};
  if(roas>=1)return{vrd:'Break-even — Optimize',vColor:'#92400e',vBg:'linear-gradient(135deg,#fef3c7,#fde68a)',vIcon:'WARN'};
  if(roas>0)return{vrd:'Loss — Needs Fix',vColor:'#7f1d1d',vBg:'linear-gradient(135deg,#fee2e2,#fca5a5)',vIcon:'STOP'};
  return{vrd:'No Data Yet',vColor:'#334155',vBg:'linear-gradient(135deg,#f1f5f9,#e2e8f0)',vIcon:'INFO'};
}

function buildChart(arr){
  if(!arr||!arr.length)return'<p style="color:#94a3b8;text-align:center;padding:24px">No data</p>';
  var W=820,H=190,PL=56,PR=64,PT=14,PB=34;
  var cW=W-PL-PR,cH=H-PT-PB;
  var maxSpend=Math.max.apply(null,arr.map(function(d){return d.spend||0;}));
  if(maxSpend<=0)return'<p style="color:#94a3b8;text-align:center;padding:24px">No spend</p>';
  var maxR=Math.max.apply(null,arr.map(function(d){return d.spend>0?(d.revenue||0)/d.spend:0;}).concat([1]));
  var n=arr.length;
  var bw=Math.max(4,Math.floor(cW/n)-5);
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;border-radius:10px;background:#f8faff;border:1px solid #e2e8f0">';
  [0,0.25,0.5,0.75,1].forEach(function(f){
    var y=PT+cH*(1-f);
    svg+='<line x1="'+PL+'" y1="'+y+'" x2="'+(PL+cW)+'" y2="'+y+'" stroke="#e2e8f0" stroke-width="1"/>';
    if(f>0)svg+='<text x="'+(PL-5)+'" y="'+(y+4)+'" text-anchor="end" font-size="10" fill="#94a3b8">'+Math.round(maxSpend*f).toLocaleString()+'</text>';
  });
  arr.forEach(function(d,i){
    var x=PL+i*(cW/n)+((cW/n)-bw)/2;
    var bh=maxSpend>0?((d.spend||0)/maxSpend)*cH:0;
    var y=PT+cH-bh;
    svg+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" fill="rgba(59,130,246,.65)" rx="3"/>';
    svg+='<text x="'+(x+bw/2)+'" y="'+(H-PB+14)+'" text-anchor="middle" font-size="9" fill="#64748b">'+(d.date?d.date.slice(5):'')+'</text>';
  });
  var pts=arr.map(function(d,i){
    var r=d.spend>0?(d.revenue||0)/d.spend:0;
    var x=PL+i*(cW/n)+cW/n/2;
    var y=PT+cH*(1-r/maxR);
    return x+','+y;
  }).join(' ');
  svg+='<polyline points="'+pts+'" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linejoin="round"/>';
  arr.forEach(function(d,i){
    var r=d.spend>0?(d.revenue||0)/d.spend:0;
    var x=PL+i*(cW/n)+cW/n/2;
    var y=PT+cH*(1-r/maxR);
    svg+='<circle cx="'+x+'" cy="'+y+'" r="3.5" fill="#f59e0b" stroke="#fff" stroke-width="1.5"/>';
    if(r>0)svg+='<text x="'+x+'" y="'+(y-8)+'" text-anchor="middle" font-size="9" fill="#b45309" font-weight="700">'+r.toFixed(1)+'x</text>';
  });
  [0.5,1].forEach(function(f){svg+='<text x="'+(PL+cW+6)+'" y="'+(PT+cH*(1-f)+4)+'" font-size="9" fill="#b45309">'+Math.round(maxR*f*10)/10+'x</text>';});
  svg+='</svg>';
  return svg;
}

function buildRecs(agg,arr){
  var recs=[];
  if(agg.spend===0){recs.push({icon:'INFO',color:'#64748b',title:'No Ads Running',desc:'No spend in this period. Campaign may be paused or out of budget.'});}
  else{
    if(agg.roas>=3)recs.push({icon:'UP',color:'#10b981',title:'Excellent ROAS — Scale Up',desc:'ROAS '+agg.roas.toFixed(2)+'x. Try increasing budget 20-30% to expand sales.'});
    else if(agg.roas>=2)recs.push({icon:'OK',color:'#38bdf8',title:'Good ROAS — Maintain',desc:'ROAS '+agg.roas.toFixed(2)+'x. Keep current budget and monitor.'});
    else if(agg.roas>=1)recs.push({icon:'WARN',color:'#f59e0b',title:'Low ROAS — Optimize',desc:'ROAS '+agg.roas.toFixed(2)+'x near break-even. Try new creative or targeting.'});
    else recs.push({icon:'STOP',color:'#ef4444',title:'Losing Money — Pause',desc:'ROAS '+agg.roas.toFixed(2)+'x. Every baht is losing. Rebuild before scaling.'});
    if(agg.ctr<1)recs.push({icon:'IMG',color:'#ef4444',title:'Low CTR — Change Creative',desc:'CTR '+agg.ctr.toFixed(2)+'%. Ad not attracting clicks. Try new image/video.'});
    else if(agg.ctr<2)recs.push({icon:'AB',color:'#f59e0b',title:'Medium CTR — A/B Test',desc:'CTR '+agg.ctr.toFixed(2)+'%. Run A/B test to find better creative.'});
    else recs.push({icon:'OK',color:'#10b981',title:'Good CTR — Creative Working',desc:'CTR '+agg.ctr.toFixed(2)+'%. Ads are attracting clicks well.'});
    if((arr||[]).length>=4){
      var half=Math.floor(arr.length/2);
      var oldS=arr.slice(0,half).reduce(function(s,d){return s+(d.spend||0);},0)/half;
      var newS=arr.slice(-half).reduce(function(s,d){return s+(d.spend||0);},0)/half;
      if(oldS>0){var pct=Math.round((newS-oldS)/oldS*100);if(Math.abs(pct)>=20)recs.push({icon:pct>0?'UP':'DOWN',color:pct>0?'#10b981':'#ef4444',title:'Spend '+(pct>0?'Up':'Down')+' '+Math.abs(pct)+'%',desc:'Recent avg spend '+Math.round(newS).toLocaleString()+'/day '+(pct>0?'higher':'lower')+' than earlier period.'});}
    }
  }
  return recs.map(function(r){
    return'<div style="display:flex;gap:14px;background:#f8faff;border-left:4px solid '+r.color+';border-radius:8px;padding:14px 16px;margin-bottom:10px">'
      +'<span style="font-size:.75rem;font-weight:800;color:'+r.color+';flex-shrink:0;margin-top:2px">['+r.icon+']</span>'
      +'<div><div style="font-size:.9rem;font-weight:700;color:'+r.color+';margin-bottom:4px">'+r.title+'</div>'
      +'<div style="font-size:.82rem;color:#475569;line-height:1.65">'+r.desc+'</div></div></div>';
  }).join('');
}

function buildDetailTable(agg){
  var rows=[
    ['Total Spend',''+fmt(agg.spend),''],
    ['Revenue',''+fmt(agg.revenue),''],
    ['ROAS',agg.roas>0?agg.roas.toFixed(2)+'x':'--',agg.roas>=2?'#d1fae5':agg.roas>=1?'#fef3c7':''],
    ['CTR',agg.ctr>0?agg.ctr.toFixed(2)+'%':'--',''],
    ['Clicks',''+fmt(agg.clicks),''],
    ['Impressions',''+fmt(agg.impressions),''],
    ['Purchases',agg.purchases>0?fmt(agg.purchases)+' times':'--',''],
    ['CPA (Cost per purchase)',agg.costPerBuy>0?''+fmt(agg.costPerBuy):'--',''],
  ];
  return'<table style="width:100%;border-collapse:collapse;font-size:.85rem">'
    +rows.map(function(r,i){var bg=r[2]||(i%2?'#f8faff':'#fff');return'<tr style="background:'+bg+'"><td style="padding:12px 16px;border:1px solid #e2e8f0;color:#64748b;font-weight:600;width:55%">'+r[0]+'</td><td style="padding:12px 16px;border:1px solid #e2e8f0;font-weight:700;font-size:.95rem">'+r[1]+'</td></tr>';}).join('')
    +'</table>';
}

function buildCompareTable(camps,periodDays){
  var aggs=camps.map(function(c){
    var arr=filterByPeriod(c.daily||[],periodDays);
    return{name:c.name,agg:calcAgg(arr)};
  });
  var cols=['spend','revenue','roas','ctr','purchases','costPerBuy'];
  var labels={spend:'Spend',revenue:'Revenue',roas:'ROAS',ctr:'CTR %',purchases:'Purchases',costPerBuy:'CPA'};
  var best={},worst={};
  cols.forEach(function(k){
    var vals=aggs.map(function(a){return a.agg[k]||0;});
    var pos=vals.filter(function(v){return v>0;});
    if(!pos.length)return;
    var bf=(k==='costPerBuy')?Math.min:Math.max;
    var wf=(k==='costPerBuy')?Math.max:Math.min;
    best[k]=bf.apply(null,pos);
    worst[k]=wf.apply(null,pos);
    if(best[k]===worst[k]){best[k]=null;worst[k]=null;}
  });
  function fmtCell(k,v){
    if(!v&&v!==0)return'--';
    if(k==='roas')return v>0?v.toFixed(2)+'x':'--';
    if(k==='ctr')return v>0?v.toFixed(2)+'%':'--';
    if(k==='costPerBuy')return v>0?fmt(v):'--';
    return v>0?fmt(v):'--';
  }
  var h='<div style="overflow-x:auto"><table class="cmp-table"><thead><tr><th style="min-width:180px">Campaign</th>';
  cols.forEach(function(k){h+='<th>'+labels[k]+'</th>';});
  h+='</tr></thead><tbody>';
  aggs.forEach(function(a){
    var nm=a.name.length>32?a.name.slice(0,30)+'...':a.name;
    h+='<tr><td title="'+a.name+'">'+nm+'</td>';
    cols.forEach(function(k){
      var v=a.agg[k]||0;
      var cls='';
      if(best[k]!=null&&v===best[k])cls='best-val';
      else if(worst[k]!=null&&v===worst[k])cls='worst-val';
      h+='<td class="'+cls+'">'+fmtCell(k,v)+'</td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table></div><div style="margin-top:8px;font-size:.7rem;color:#94a3b8"><span style="color:#10b981;font-weight:700">Green</span> = best &nbsp; <span style="color:#ef4444;font-weight:700">Red</span> = worst</div>';
  return h;
}

function mergeDaily(camps,periodDays){
  var byDate={};
  camps.forEach(function(c){
    var arr=c.daily||[];
    arr=filterByPeriod(arr,periodDays);
    arr.forEach(function(d){
      if(!d.date)return;
      if(!byDate[d.date])byDate[d.date]={date:d.date,spend:0,revenue:0,impressions:0,clicks:0,purchases:0,conversations:0};
      var b=byDate[d.date];
      b.spend+=(+d.spend||0);b.revenue+=(+d.revenue||0);b.impressions+=(+d.impressions||0);b.clicks+=(+d.clicks||0);b.purchases+=(+d.purchases||0);b.conversations+=(+d.conversations||0);
    });
  });
  return Object.keys(byDate).sort().map(function(d){return byDate[d];});
}

function buildCreatives(c){if(!c||!c.length)return'';return c.map(function(a){var th=a.thumbnail?'<img src="'+a.thumbnail+'" style="width:72px;height:72px;object-fit:cover;border-radius:8px;flex-shrink:0;border:1px solid #e2e8f0">':'<div style="width:72px;height:72px;background:#f1f5f9;border-radius:8px;flex-shrink:0"></div>';return'<div style="display:flex;gap:14px;align-items:flex-start;padding:14px;background:#f8faff;border:1px solid #e8f0ff;border-radius:10px;margin-bottom:10px">'+th+'<div style="flex:1;min-width:0"><div style="font-weight:700;margin-bottom:4px;font-size:.85rem">'+(a.name||'')+'</div>'+((a.body||'').slice(0,120)?'<div style="font-size:.78rem;color:#475569;margin-bottom:8px">'+(a.body||'').slice(0,120)+'</div>':'')+'<a href="'+a.url+'" target="_blank" style="font-size:.72rem;color:#1565c0;font-weight:700">Ads Manager</a></div></div>';}).join('');}
function render(periodDays){
  currentPeriod=periodDays;
  var now=new Date();
  var dtStr=now.toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'})+' '+now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  var activeCamp=(currentCampIdx>=0&&currentCampIdx<campaigns.length)?campaigns[currentCampIdx]:null;
  var dailyArr,agg,title;
  if(activeCamp){
    var raw2=activeCamp.daily||[];
    dailyArr=filterByPeriod(raw2,periodDays);
    agg=calcAgg(dailyArr);
    title=activeCamp.name;
  }else{
    dailyArr=mergeDaily(campaigns,periodDays);
    agg=calcAgg(dailyArr);
    title=isMulti?(campaigns.length+' Campaigns Combined'):(campaigns[0].name);
  }
  var v=getVerdict(agg.roas);
  var roasC=agg.roas>=2?'#10b981':agg.roas>=1?'#f59e0b':'#ef4444';
  var eName=title.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  var maxLen=Math.max.apply(null,campaigns.map(function(c){return(c.daily||[]).length;}).concat([0]));
  var periodLabel=periodDays==='today'?'วันนี้':periodDays==='yesterday'?'เมื่อวาน':dailyArr.length+' days';
  var periodBar='';
  if(maxLen>0){
    periodBar='<div class="period-bar no-print">';
    periodBar+='<button class="ptab'+(periodDays==='today'?' active':'')+'" onclick="switchPeriod(\'today\')">วันนี้</button>';
    periodBar+='<button class="ptab'+(periodDays==='yesterday'?' active':'')+'" onclick="switchPeriod(\'yesterday\')">เมื่อวาน</button>';
    periodBar+='<button class="ptab'+(periodDays===3?' active':'')+'" onclick="switchPeriod(3)">3 Days</button>';
    periodBar+='<button class="ptab'+(periodDays===7?' active':'')+'" onclick="switchPeriod(7)">7 Days</button>';
    periodBar+='<button class="ptab'+(periodDays===30?' active':'')+'" onclick="switchPeriod(30)">30 Days</button>';
    periodBar+='</div>';
  }

  var campTabBar='';
  if(isMulti){
    campTabBar='<div class="camp-tab-bar no-print">';
    campTabBar+='<button class="camp-tab all-tab'+(currentCampIdx===-1?' active':'')+'" onclick="switchCamp(-1)">&#9776; ภาพรวม '+campaigns.length+' แคมเปญ</button>';
    campaigns.forEach(function(c,i){
      var sn=c.name.length>30?c.name.slice(0,28)+'..':c.name;
      campTabBar+='<button class="camp-tab'+(currentCampIdx===i?' active':'')+'" title="'+c.name+'" onclick="switchCamp('+i+')">'+sn+'</button>';
    });
    campTabBar+='</div>';
    if(currentCampIdx>=0){
      var activeName=campaigns[currentCampIdx].name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      campTabBar+='<div style="background:#e8f0fe;border-left:4px solid #1565c0;padding:10px 48px;font-size:.78rem;color:#1565c0;font-weight:700">&#128204; กำลังดู: แคมเปญที่ '+(currentCampIdx+1)+' — '+activeName+'</div>';
    }
  }

  var h='<div class="page">'
    +'<div class="hd"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:20px">'
    +'<div style="flex:1;min-width:0">'
    +'<div class="brand">Rich Biotech · Campaign Performance Report</div>'
    +'<div class="hd-title">'+eName+'</div>'
    +'<div class="hd-meta">'+(isMulti&&currentCampIdx===-1?campaigns.length+' campaigns combined · ':'')+periodLabel+' · Generated '+dtStr+'</div>'
    +'<div class="vrd" style="background:'+v.vBg+';color:'+v.vColor+'">'+v.vIcon+' '+v.vrd+'</div>'
    +'</div>'
    +'<div class="hd-btns no-print">'
    +'<button class="hd-btn" onclick="window.print()">Print / PDF</button>'
    +'<button class="hd-btn copy-btn" id="copyBtn" onclick="copyLink()">Copy Link for CEO</button>'
    +'</div></div></div>'
    +periodBar+campTabBar
    +'<div class="kpi-grid">'
    +'<div class="kpi-card"><div class="kpi-lbl">Total Spend</div><div class="kpi-val" style="color:#f59e0b">'+fmt(agg.spend)+'</div></div>'
    +'<div class="kpi-card"><div class="kpi-lbl">ROAS</div><div class="kpi-val" style="color:'+roasC+'">'+(agg.roas>0?agg.roas.toFixed(2)+'x':'--')+'</div></div>'
    +'<div class="kpi-card"><div class="kpi-lbl">CTR</div><div class="kpi-val" style="color:#38bdf8">'+(agg.ctr>0?agg.ctr.toFixed(2)+'%':'--')+'</div></div>'
    +'<div class="kpi-card"><div class="kpi-lbl">Purchases</div><div class="kpi-val" style="color:#10b981">'+(agg.purchases>0?fmt(agg.purchases):'--')+'</div></div>'
    +'</div>';

  if(isMulti&&currentCampIdx===-1){
    h+='<div class="section"><div class="sec-ttl">Campaign Comparison</div>'+buildCompareTable(campaigns,periodDays)+'</div>';
  }

  h+='<div class="section"><div class="sec-ttl">Spend &amp; ROAS Daily ('+periodLabel+')</div>'+buildChart(dailyArr)+'</div>'
    +'<div class="section"><div class="sec-ttl">AI Analysis &amp; Recommendations</div>'+buildRecs(agg,dailyArr)+'</div>'
      +(creatives.length?'<div class="section"><div class="sec-ttl">Active Ad Creatives</div>'+buildCreatives(creatives)+'</div>':'')
      +'<div class="section"><div class="sec-ttl">Detailed Data</div>'+buildDetailTable(agg)+'</div>'
    +'<div class="ft">Rich Biotech · Ads Mission Dashboard · '+dtStr+'</div>'
    +'</div>';

  document.getElementById('app').innerHTML=h;
}

window.switchPeriod=function(d){render(d);window.scrollTo(0,0);};
window.switchCamp=function(i){currentCampIdx=i;render(currentPeriod);window.scrollTo(0,0);};
window.copyLink=function(){
  var url=location.href;
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){var b=document.getElementById('copyBtn');if(b){b.textContent='Copied!';setTimeout(function(){b.textContent='Copy Link for CEO';},2500);}});}
  else{prompt('Copy this link:',url);}
};

var lens=campaigns.map(function(c){return(c.daily||[]).length;});
var maxL=Math.max.apply(null,lens.concat([0]));
var initDays=maxL>=30?30:(maxL>=7?7:(maxL>=3?3:maxL||1));
render(initDays);
})();
</script>
</body>
</html>
